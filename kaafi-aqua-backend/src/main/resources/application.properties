# Application
spring.application.name=kaafi-aqua-backend
server.port=8080
server.servlet.context-path=/api

# === DATABASE CONFIGURATION ===
spring.datasource.url=jdbc:mysql://localhost:3306/kaafiaqua_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=kaafi_aqua_super_secret_key_change_this_in_production_2024_extra_long_key_64chars
app.jwt.expiration=604800000

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.path=./uploads
app.upload.max-file-size=5242880

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=noreply@kaafiaqua.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging
logging.level.com.kaafi.aqua=DEBUG
logging.level.org.springframework.security=DEBUG

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Timezone
spring.jackson.time-zone=Africa/Nairobi